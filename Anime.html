<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    background-image: url("images/marin.jpg");
    background-size: cover;
    background-position: center;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    top: 0;
    left: 0;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    padding: 20px;
}

/* titlu */
h1 {
    text-align: center;
    margin-top: 30px;
    font-size: 36px;
}

/* buton back */
.back {
    display: inline-block;
    margin-bottom: 20px;
    color: white;
    text-decoration: none;
    font-size: 18px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

/* CARD link */
.card {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    padding: 20px;
    border-radius: 15px;
    text-decoration: none;
    color: white;
    font-size: 18px;
    transition: 0.25s;
}

/* hover */
.card:hover {
    background: rgba(255,0,0,0.8);
    transform: scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<a class="back" href="index.html">⬅ Înapoi</a>

<h1>🎌 Anime</h1>

<div class="grid">

    <a class="card" href="https://aniwatch.to" target="_blank">
        🎥 AniWatch
    </a>

    <a class="card" href="https://gogoanime.pe" target="_blank">
        📺 GogoAnime
    </a>

    <a class="card" href="https://9anime.to" target="_blank">
        ⭐ 9Anime
    </a>

    <a class="card" href="https://myanimelist.net" target="_blank">
        📊 MyAnimeList
    </a>

</div>

</div>

</body>
</html>
