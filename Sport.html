<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;

    background-image: url("images/liverpool.png");
    background-size: cover;
    background-position: center;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    top: 0;
    left: 0;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-top: 30px;
}

/* back */
.back {
    color: white;
    text-decoration: none;
}

/* section */
.section {
    margin-top: 40px;
}

/* grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-top: 15px;
}

/* card */
.card {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    padding: 15px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    transition: 0.25s;
}

.card:hover {
    background: rgba(0,255,100,0.6);
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<a class="back" href="index.html">⬅ Înapoi</a>

<h1>⚽ Sport</h1>

<!-- LIVE -->
<div class="section">
<h2>🔴 Live</h2>

<div class="grid">
    <a class="card" href="https://livetv.sx" target="_blank">LiveTV.sx</a>
    <a class="card" href="https://www.cool-hdsport.com/" target="_blank">Digi-HDsport</a>
    <a class="card" href="https://army.footybite.to/" target="_blank">Footybite</a>
</div>
</div>



<!-- HIGHLIGHTS -->
<div class="section">
<h2>🎥 Highlights</h2>

<div class="grid">
    <a class="card" href="https://timesoccertv.com/" target="_blank">Time soccer</a>
    <a class="card" href="https://hoofoot.com/?home" target="_blank">Hofoot</a>
    <a class="card" href="https://www.footreplays.com/" target="_blank">Footreplays</a>
</div>
</div>

</div>

</body>
</html>
